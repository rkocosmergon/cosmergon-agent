name: Publish to PyPI

on:
  workflow_dispatch:
    # MANUELL — nie auf push:tags ändern ohne explizite Gründer-Freigabe.
    # Hintergrund: push:tags v* hat v0.3.40/0.3.41 ohne Go veröffentlicht (08.04.2026).
    # Der Trusted Publisher auf PyPI ist aktiv — jede Trigger-Änderung publiziert sofort.
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api_token needed — Trusted Publisher via OIDC
