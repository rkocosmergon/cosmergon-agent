name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Lint, import, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + tools
        # pip>=26.1: fixes CVE-2026-3219 (concatenated tar/zip handling, released 2026-04-26).
        # Without this upgrade pip-audit fails on the runner-installed pip itself.
        run: |
          pip install --upgrade "pip>=26.1"
          pip install -e ".[dev]" pip-audit

      - name: Lint (ruff)
        run: ruff check src/

      - name: Import check
        run: python -c "import cosmergon_agent; print(cosmergon_agent.__version__)"

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Dependency audit
        run: pip-audit
